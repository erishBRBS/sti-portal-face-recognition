services:
  face-recognition-api:
    build:
      context: .
    container_name: face-recognition-api
    restart: unless-stopped
    ports:
      - "9000:9000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - insightface-models:/root/.insightface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  insightface-models: