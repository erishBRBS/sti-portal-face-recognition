services:
  face-recognition-api:
    build:
      context: .
    container_name: face-recognition-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "9000:9000"
    volumes:
      - ./data:/app/data
      - insightface-models:/root/.insightface
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: sti-portal-python-cloudflared-tunnel
    restart: unless-stopped
    depends_on:
      face-recognition-api:
        condition: service_healthy
    command: tunnel --no-autoupdate run
    volumes:
      - ./cloudflared:/etc/cloudflared:ro

volumes:
  insightface-models: